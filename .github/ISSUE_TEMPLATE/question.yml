name: Question
description: Ask a usage or design question.
title: "[Question]: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to understand or accomplish?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include commands, repository layout, or screenshots if relevant.
    validations:
      required: false
